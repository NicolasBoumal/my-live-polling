<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=index.html">

        window.location.replace("index.html");
    </script>
</head>
<body>
    <p>Redirecting to <a href="index.html">index.html</a>.</p>
</body>
</html>
